name: autobump cask

# keystats に新リリースが出たら Casks/keystats.rb の version と sha256 を
# 自動で更新して commit する。トリガーは 3 系統:
#   - schedule : 1 時間ごとに最新リリースを確認(取りこぼしの保険)
#   - workflow_dispatch : 手動実行(Actions タブのボタン)
#   - repository_dispatch : keystats 側の release から即時発火させたい場合
#     (dist.sh などから `gh api .../dispatches -f event_type=keystats-release`)

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [keystats-release]

permissions:
  contents: write

concurrency:
  group: autobump
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump cask to latest keystats release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SRC_REPO: gapul/keystats
          CASK: Casks/keystats.rb
        run: |
          set -euo pipefail

          release="$(gh api "repos/$SRC_REPO/releases/latest")"
          latest="$(jq -r .tag_name <<<"$release")"
          latest="${latest#v}"
          current="$(sed -nE 's/^[[:space:]]*version "([^"]+)".*/\1/p' "$CASK" | head -1)"
          echo "current=$current  latest=$latest"

          if [ "$current" = "$latest" ]; then
            echo "already up to date"
            exit 0
          fi

          asset="keystats-${latest}-macos-arm64.zip"
          digest="$(jq -r --arg name "$asset" '.assets[] | select(.name == $name) | .digest' <<<"$release")"
          case "$digest" in sha256:*) sha="${digest#sha256:}" ;; *) echo "missing sha256 for $asset" >&2; exit 1 ;; esac
          echo "sha256=$sha"

          # version と sha256 の行を差し替え(url は #{version} 展開なので触らない)
          sed -i -E "s|^([[:space:]]*version ).*|\1\"${latest}\"|" "$CASK"
          sed -i -E "s|^([[:space:]]*sha256 ).*|\1\"${sha}\"|" "$CASK"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$CASK"
          git commit -m "keystats ${latest} (auto)"
          git push
